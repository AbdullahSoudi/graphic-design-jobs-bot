name: 🎨 Graphic Design Jobs Bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📂 Restore seen jobs cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin data --depth=1 2>/dev/null || true
          if git show origin/data:seen_jobs.json > seen_jobs.json 2>/dev/null; then
            JOBS_COUNT=$(python3 -c "import json; print(len(json.load(open('seen_jobs.json'))))" 2>/dev/null || echo "0")
            echo "✅ Restored seen_jobs.json — $JOBS_COUNT previously seen jobs"
          else
            echo "📝 No previous state found, starting fresh"
            echo "[]" > seen_jobs.json
          fi

      - name: 🚀 Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SEEN_JOBS_FILE: seen_jobs.json
        run: python main.py

      - name: 💾 Save seen jobs cache
        if: always()
        run: |
          cp seen_jobs.json /tmp/seen_jobs.json
          
          JOBS_COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/seen_jobs.json'))))" 2>/dev/null || echo "0")
          echo "📊 Jobs to save: $JOBS_COUNT"
          
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git checkout origin/data -- . 2>/dev/null || true
            git checkout -B data origin/data 2>/dev/null || git checkout --orphan data
          else
            git checkout --orphan data
            git rm -rf . 2>/dev/null || true
          fi
          
          cp /tmp/seen_jobs.json seen_jobs.json
          git add seen_jobs.json
          
          if git diff --cached --quiet; then
            echo "📝 No changes to save"
          else
            git commit -m "Update seen_jobs.json — $JOBS_COUNT jobs tracked [skip ci]"
            git push origin data --force
            echo "✅ State saved to data branch — $JOBS_COUNT jobs tracked"
          fi
